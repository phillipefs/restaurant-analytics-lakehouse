variables:
  run_as_spn:
    description: Service principal application ID used to run bundle resources
    default: "94a0841a-2472-4fe0-8264-70d16f025255" #Service Principal Development

  compute_policy_id:
    description: Databricks compute policy ID used by CDC gateway and orchestration job clusters
    default: 0005F147C3FA0AA4

  storage_credential_name:
    description: Unity Catalog storage credential used by external locations
    default: storage_credential

  storage_account_name:
    description: Azure Data Lake Storage account used by the lakehouse external locations
    default: adlsmathlabdatalake
