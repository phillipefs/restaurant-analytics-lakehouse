resources:
  jobs:
    job_restaurant_cdc_ingestion:
      name: job_restaurant_cdc_ingestion
      max_concurrent_runs: 1
      tags:
        process: cdc_restaurant
      schedule:
        quartz_cron_expression: "0 0 13 * * ?"
        timezone_id: America/Sao_Paulo
      job_clusters:
        - job_cluster_key: pipeline_control
          new_cluster:
            spark_version: 15.4.x-scala2.12
            policy_id: ${var.compute_policy_id}
            apply_policy_default_values: true
            num_workers: 1
            custom_tags:
              process: cdc_restaurant
      tasks:
        - task_key: start_gateway
          description: Start the Lakeflow CDC ingestion gateway before the triggered ingestion run.
          job_cluster_key: pipeline_control
          notebook_task:
            notebook_path: ${workspace.file_path}/notebooks/operations/manage_pipeline_gateway
            source: WORKSPACE
            base_parameters:
              action: start
              pipeline_id: ${resources.pipelines.pipeline_gw_ingestion_restaurantops.id}
              timeout_seconds: "1800"
              poll_seconds: "15"
              ready_grace_seconds: "60"
              expected_datasets: customers,historical_orders,menu_items,restaurants,reviews

        - task_key: run_ingestion_pipeline
          description: Run the triggered Lakeflow CDC ingestion pipeline.
          depends_on:
            - task_key: start_gateway
          pipeline_task:
            pipeline_id: ${resources.pipelines.pl_restaurant_cdc_ingestion.id}

        - task_key: stop_gateway
          description: Stop the Lakeflow CDC ingestion gateway after the ingestion run finishes.
          depends_on:
            - task_key: start_gateway
            - task_key: run_ingestion_pipeline
          run_if: ALL_DONE
          job_cluster_key: pipeline_control
          notebook_task:
            notebook_path: ${workspace.file_path}/notebooks/operations/manage_pipeline_gateway
            source: WORKSPACE
            base_parameters:
              action: stop
              pipeline_id: ${resources.pipelines.pipeline_gw_ingestion_restaurantops.id}
              timeout_seconds: "900"
              poll_seconds: "15"
