resources:
  external_locations:
    external_location_landing:
      name: landing
      url: abfss://landing@${var.storage_account_name}.dfs.core.windows.net/
      credential_name: ${var.storage_credential_name}
      comment: "Landing external location for Restaurant Lakehouse."
      lifecycle:
        prevent_destroy: true
      grants:
        - principal: ${var.run_as_spn}
          privileges:
            - CREATE_MANAGED_STORAGE
            - READ_FILES
            - WRITE_FILES
        - principal: admins
          privileges:
            - ALL_PRIVILEGES
            - MANAGE

