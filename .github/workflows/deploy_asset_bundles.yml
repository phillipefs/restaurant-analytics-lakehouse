name: Deploy Lakehouse Platform

on:
  push:
    branches: [master]
    paths:
      - "databricks.yml"
      - "pyproject.toml"
      - "resources/**"
      - "notebooks/**"
      - "src/**"
      - ".github/workflows/**"
      - "!README.md"
      - "!LICENSE"
  workflow_dispatch:
    inputs:
      target:
        description: "Deploy target environment"
        type: choice
        required: true
        default: dev
        options: [dev, prod, both]

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-restaurant-analytics-${{ github.ref }}
  cancel-in-progress: true

env:
  PATH_PROJECT: .

jobs:
  dev:
    name: DEV - Validate & Deploy
    runs-on: ubuntu-latest
    environment: dev
    env:
      DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
      DATABRICKS_AUTH_TYPE: oauth-m2m
      DATABRICKS_CLIENT_ID: ${{ vars.SPN_APP_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
    # DEV roda no push para master OU manualmente com target=dev|both
    if: >
      (github.event_name == 'push' && github.ref == 'refs/heads/master')
      || (github.event_name == 'workflow_dispatch' && (inputs.target == 'dev' || inputs.target == 'both'))
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Instalar uv
        uses: astral-sh/setup-uv@v8
        with:
          version: "0.11.19"
          enable-cache: true

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Instalar Databricks CLI
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo apt-get install -y zip
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sudo sh
          databricks -v

      - name: Validar e fazer deploy (DEV)
        working-directory: ${{ env.PATH_PROJECT }}
        run: |
          set -euo pipefail
          TARGET="${{ vars.ENV_NAME }}"
          RUN_AS_SPN="${{ vars.SPN_APP_ID }}"

          uv --version
          databricks bundle summary -t "$TARGET" --var "run_as_spn=$RUN_AS_SPN"
          databricks bundle validate -t "$TARGET" --var "run_as_spn=$RUN_AS_SPN"
          databricks bundle deploy -t "$TARGET" --var "run_as_spn=$RUN_AS_SPN"

  prod:
    name: PROD - Validate & Deploy
    runs-on: ubuntu-latest
    environment: prod
    needs: dev
    env:
      DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
      DATABRICKS_AUTH_TYPE: oauth-m2m
      DATABRICKS_CLIENT_ID: ${{ vars.SPN_APP_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
    if: >
      always()
      && github.event_name == 'workflow_dispatch'
      && (inputs.target == 'prod' || inputs.target == 'both')
      && (needs.dev.result == 'success' || needs.dev.result == 'skipped')

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Instalar uv
        uses: astral-sh/setup-uv@v8
        with:
          version: "0.11.19"
          enable-cache: true

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Instalar Databricks CLI
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo apt-get install -y zip
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sudo sh
          databricks -v

      - name: Validar e fazer deploy (PRD)
        working-directory: ${{ env.PATH_PROJECT }}
        run: |
          set -euo pipefail
          TARGET="${{ vars.ENV_NAME }}"
          RUN_AS_SPN="${{ vars.SPN_APP_ID }}"

          uv --version
          databricks bundle summary -t "$TARGET" --var "run_as_spn=$RUN_AS_SPN"
          databricks bundle validate -t "$TARGET" --var "run_as_spn=$RUN_AS_SPN"
          databricks bundle deploy -t "$TARGET" --var "run_as_spn=$RUN_AS_SPN"
