bundle:
  name: restaurant_analytics_lakehouse
  uuid: a040dfba-8274-43ba-92be-85c6ef0f17bf

artifacts:
  python_artifact:
    type: whl
    path: .
    build: uv build --wheel

include:
  - config/*.yml
  - resources/**/*.yml

sync:
  include:
    - notebooks/**
    - src/**
  exclude:
    - img/**
    - .gitignore
    - LICENSE
    - pyproject.toml
    - README.md
    - requirements.txt
    - doc/**

targets:
  dev:
    default: true
    workspace:
      host: https://adb-1049848684377647.7.azuredatabricks.net
      root_path: /Workspace/projects/${bundle.name}
    presets:
      artifacts_dynamic_version: true
      tags:
        env: development
        project: ${bundle.name}
    run_as:
      service_principal_name: ${var.run_as_spn}

  prod:
    mode: production
    workspace:
      host: https://adb-1049848684377647.7.azuredatabricks.net
      root_path: /Workspace/projects/${bundle.name}
    presets:
      tags:
        env: production
        project: ${bundle.name}
    run_as:
      service_principal_name: ${var.run_as_spn}
    permissions:
      - service_principal_name: ${var.run_as_spn}
        level: CAN_MANAGE
